# 数据源配置
datasource:
  root_dir: "../data"

# RAG 知识库配置
rag:
  env: "stg" # 环境：prod, stg
  prod_url: "http://rag.prod.example.com"
  stg_url: "http://rag.stg.example.com"
  port: 80
  login_api_endpoint: "/appid/auth/login"
  import_api_endpoint: "/api/open/kn/docCreateV2" # RAG 知识库导入接口
  upload_api_endpoint: "/api/open/kn/fileUpload" # MD 文件上传接口
  tenant_id: "os" # 租户编码
  user_name: "os" # 登录用户名
  secret_key: "123456789abcdef" # 登录密钥
  knowledge_base_id: 12345
  category_id: 12345
  source: "local"
  max_concurrent_files: 10 # 每次批量导入 md 文档数量

# 日志和监控
logging:
  level: "DEBUG" # DEBUG, INFO, WARNING, ERROR
  file: "./logs/import.log"
  max_size: "10MB"
  backup_count: 5
  process_record_file: "./logs/.process" # 记录导入进度的文件
